<nav
        data-th-fragment="navbar"
        class="bg-white border-gray-900 shadow-sm dark:bg-gray-900"
>
  <div
          class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
  >

    <!-- BRAND -->
    <a
            data-th-href="@{'/'}"
            class="flex items-center space-x-3 rtl:space-x-reverse"
    >
      <img
              data-th-src="@{'/images/telephone.png'}"
              class="h-8 shadow rounded-full"
              alt="Logo"
      />
      <span
              class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white"
      >SCM2.0</span>
    </a>

    <!-- RIGHT SIDE -->
    <div class="flex items-center gap-3 md:order-2">

      <!-- THEME BUTTON -->
      <button
              id="theme_change_button"
              class="bg-gray-200 px-3 py-2 rounded-lg dark:bg-gray-600"
      >
        <i class="fa-solid fa-circle-half-stroke"></i> <span>Light</span>
      </button>

      <!-- NOT LOGGED IN -->
      <div data-th-if="${#authentication == null or #authentication.principal == 'anonymousUser'}">
        <a
                data-th-href="@{'/login'}"
                class="text-white bg-gray-800 hover:bg-gray-900 px-4 py-2 rounded-lg"
        >
          Login
        </a>
        <a
                data-th-href="@{'/register'}"
                class="text-white bg-gray-800 hover:bg-gray-900 px-4 py-2 rounded-lg"
        >
          Signup
        </a>
      </div>

      <!-- LOGGED IN -->
      <div
              data-th-if="${#authentication != null and #authentication.principal != 'anonymousUser'}"
              class="flex items-center gap-3"
      >

        <!-- 🔥 ALWAYS DEFAULT IMAGE -->
        <a data-th-href="@{'/user/profile'}">
          <img
                  th:src="@{'/images/default.png'}"
                  class="w-10 h-10 rounded-full border object-cover"
                  alt="profile"
          />
        </a>

        <!-- USER NAME -->
        <span
                class="text-white font-medium"
                th:text="${user != null ? user.name : 'User'}"
        ></span>

        <!-- LOGOUT -->
        <a
                data-th-href="@{'/logout'}"
                class="text-white bg-red-600 hover:bg-red-700 px-3 py-2 rounded-lg"
        >
          Logout
        </a>
      </div>

      <!-- MOBILE MENU BUTTON -->
      <button
              data-collapse-toggle="navbar-cta"
              type="button"
              class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100"
      >
        <span class="sr-only">Open main menu</span>
        <svg
                class="w-5 h-5"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 17 14"
        >
          <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M1 1h15M1 7h15M1 13h15"
          />
        </svg>
      </button>
    </div>

    <!-- MENU LINKS -->
    <div
            class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
            id="navbar-cta"
    >
      <ul
              class="flex flex-col font-medium p-4 md:p-0 mt-4 border rounded-lg bg-gray-50 md:flex-row md:space-x-8 md:mt-0 md:border-0 md:bg-white"
      >
        <li>
          <a data-th-href="@{'/home'}">Home</a>
        </li>
        <li>
          <a data-th-href="@{'/about'}">About</a>
        </li>
        <li>
          <a data-th-href="@{'/services'}">Services</a>
        </li>
        <li>
          <a data-th-href="@{'/contact'}">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
