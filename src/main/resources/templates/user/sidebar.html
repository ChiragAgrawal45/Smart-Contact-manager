<aside
        data-th-fragment="sidebar"
        id="logo-sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0"
        aria-label="Sidebar"
>
  <div class="h-full pt-16 px-3 py-4 overflow-y-auto bg-gray-50 dark:bg-gray-800">

    <a href="#" class="flex flex-col items-center ps-2.5 mb-8">

      <!-- ✅ FIXED IMAGE -->
      <img
              th:src="@{'/images/default.png'}"
              class="h-16 sm:h-24 shadow-md rounded-full object-cover"
              alt="Profile"
      />

      <span class="text-gray-500" th:text="${loggedInUser.name}">
        User Name
      </span>

      <span class="text-xl font-semibold dark:text-white">
        Welcome to SCM
      </span>
    </a>

    <ul class="space-y-2 font-medium">

      <li>
        <a data-th-href="@{'/user/dashboard'}"
           class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700">
          <span class="ms-3">Dashboard</span>
        </a>
      </li>

      <li>
        <a data-th-href="@{'/user/profile'}"
           class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700">
          <span class="ms-3">Profile</span>
        </a>
      </li>

      <li>
        <a data-th-href="@{'/user/contacts/add'}"
           class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700">
          <span class="ms-3">Add Contact</span>
        </a>
      </li>

      <li>
        <a data-th-href="@{'/user/contacts'}"
           class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700">
          <span class="ms-3">Contacts</span>
        </a>
      </li>

      <li>
        <a data-th-href="@{'/logout'}"
           class="flex items-center p-2 text-red-600 rounded-lg hover:bg-red-100 dark:hover:bg-red-700">
          <span class="ms-3">Logout</span>
        </a>
      </li>

    </ul>
  </div>
</aside>
